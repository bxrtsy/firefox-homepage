<!doctype html>
<html lang="en-US">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width" />
		<title>Welcome</title>
		<link href="style.css" rel="stylesheet" />
		<script async src="main.js"></script>
	</head>
	<body>
		<main>
			<div class="firefox-logo">
				<img src="chrome://branding/content/about-logo.png" width="64" height="64" />
				<div class="firefox-title">Firefox</div>
			</div>
			<form action="https://duckduckgo.com/" method="GET">
				<input type="text" name="q" placeholder="Search with DuckDuckGo">
			</form>
			<div id="shortcut-container" class="shortcut-section"></div>
		</main>
		<footer>
			<img draggable="false" src="./resources/footer.svg">
		</footer>
	</body>
</html>
